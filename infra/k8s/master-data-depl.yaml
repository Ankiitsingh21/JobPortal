apiVersion: apps/v1
kind: Deployment
metadata:
  name: master-data-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master-data
  template:
    metadata:
      labels:
        app: master-data
    spec:
      containers:
        - name: master-data
          image: jp-master-data
          env:
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY

            - name: DATABASE_URL
              value: postgres://postgres:postgres@postgres-master-data-srv:5432/masterdata

            - name: REDIS_URL
              value: redis://redis-master-data-srv:6379
---
apiVersion: v1
kind: Service
metadata:
  name: master-data-srv
spec:
  selector:
    app: master-data
  ports:
    - name: master-data
      protocol: TCP
      port: 3000
      targetPort: 3000